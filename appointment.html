<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="appointment-styles.css">
</head>
<body>
    <div class="container">

        <div class="header">

        <div class="logo">
            <h1>Aspire QMD</h1>
        </div>

        <div class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="appointment.html">Sign In</a></li>
                <li><a href="signup.html">Sign UP</a></li>
            </ul>
        </div>


    </div>

    <div class="appointment-header">
        <h1 class="h1-text-for-appoitment">Sign In To Book Appointment</h1>
        <div class="question-text">do not have an account? <a href="signup.html">Sign Up</a></div>
    </div>


    <div class="Sign-In-Form">
        <form class="">
           <label for=""><span class="important">*</span>Email:</label>
           <br>
           <input type="text"  id="Email" required>
           <br><br>
           <label for=""><span class="important">*</span>Password:</label><br>
            <input type="password"  id="Password" required>
            <br><br>
            <div class="select-div">
            <input type="submit" value="submit" class="btn-sign-in" id="btn-sign-in">
        </form>

    </div>

</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
     $(document).ready(function() {

// jQuery click event for the button
$('#btn-sign-in').on('click', function(event) {
        event.preventDefault(); // Prevent default form submission

var user_email;
var user_password;

var get_Local_Storage_email;
var get_Local_Stroage_password;


var user_email = $('#Email').val();
var user_password = $('#Password').val();


get_Local_Storage_email = localStorage.getItem('email');
get_Local_Stroage_password = localStorage.getItem('password');

if(!get_Local_Storage_email || !get_Local_Stroage_password){
        alert("No such record found in database");
}

if(user_email.toString() == get_Local_Storage_email.toString() && user_password == get_Local_Stroage_password){
        window.location.href = "booking.html?timestamp=" + new Date().getTime();
        // alert("Login Successful, continue to Book Appointment!");
}
else{
        alert("Invalid user details");
}


});
});

</script>
<script src="/validate.js"></script>
</body>
</html>
