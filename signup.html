<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="appointment-styles.css">
</head>
<body>
    <div class="container">

        <div class="header">

        <div class="logo">
            <h1>Aspire QMD</h1>
        </div>

        <div class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="appointment.html">Sign In</a></li>
                <li><a href="signup.html">Sign UP</a></li>
            </ul>
        </div>


    </div>

    <div class="appointment-header">
        <h1 class="h1-text-for-appoitment">Sign Up</h1>
        <div class="question-text">already have an account? <a href="appointment.html">Sign In</a></div>
    </div>


    <div class="Sign-In-Form">
        <form class="">

            <label for=""><span class="important">*</span>FirstName:</label>
            <br>

            <input type="text"  id="FirstName" required>
            <br>
            <br>

            <label for=""><span class="important">*</span>Lastname:</label>
            <br>
            <input type="text"  id="Lastname" required>
            <br>
            <br>
           <label for=""><span class="important">*</span>Email:</label>
           <br>
           <input type="text"  id="Email" required>
           <br><br>
           <label for=""><span class="important">*</span>Password:</label><br>
            <input type="password"  id="Password" required>
            <br><br>
            <div class="select-div">
            <input type="submit" value="submit" class="btn-submit-form" id="btn-submit-form">
        </form>

    </div>

</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {

        // jQuery click event for the button
        $('#btn-submit-form').on('click', function(event) {
            event.preventDefault(); // Prevent default form submission

            // Get the email and password values
            var user_email = $('#Email').val();
            var user_password = $('#Password').val();

            // Basic validation to check if email and password are provided
            if (user_email === '' || user_password === '') {
                alert('Please fill out both email and password fields.');
                return; // Stop if validation fails
            }

            // Store the email and password in localStorage
            localStorage.setItem('email', user_email);
            localStorage.setItem('password', user_password);

            // Redirect to appointment.html with a timestamp
            window.location.href = "appointment.html?timestamp=" + new Date().getTime();
        });

    });
</script>
<script src="/validate.js"></script>
</body>
</html>
